<style>
.site-footer {
  background-color: #1a2e35;
  color: #a0b4b8;
  text-align: center;
  padding: 1.2rem 1rem;
  font-family: 'Work Sans', sans-serif;
  font-size: 0.9rem;
  margin-top: 3rem;
  border-top: 3px solid #0f6b72;
}
.site-footer a {
  color: #7ecdd1;
  text-decoration: none;
}
.site-footer a:hover {
  color: #ffffff;
}
</style>

<footer class="site-footer">
  <p style="margin:0;">
    &copy; 2026 Tanmayee Kodali &nbsp;&middot;&nbsp;
    MPH in Global Health, Emory University &nbsp;&middot;&nbsp;
    <a href="https://github.com/TanmayeeKodali" target="_blank"><i class="fab fa-github"></i> GitHub</a>
    &nbsp;&middot;&nbsp;
    <a href="https://www.linkedin.com/in/tanmayeekodali/" target="_blank"><i class="fab fa-linkedin-in"></i> LinkedIn</a>
  </p>
</footer>

<script>
document.addEventListener("DOMContentLoaded", function() {
  var links = document.querySelectorAll(".navbar-nav a");
  links.forEach(function(link) {
    if (link.textContent.trim() === "GitHub") {
      link.innerHTML = '<i class="fab fa-github"></i> GitHub';
      link.setAttribute("target", "_blank");
    }
    if (link.textContent.trim() === "LinkedIn") {
      link.innerHTML = '<i class="fab fa-linkedin-in"></i> LinkedIn';
      link.setAttribute("target", "_blank");
    }
  });
});
</script>
